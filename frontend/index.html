<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Multi-Agent Research System — ask a question and get a well-researched answer.">
    <title>Multi-Agent Research System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-glow"></div>
            <h1>Multi-Agent Research</h1>
            <p class="subtitle">Ask a question. Agents collaborate. Get answers.</p>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('research')">Web & RAG Research</button>
            <button class="tab-btn" onclick="switchTab('upload')">Upload to Knowledge Base</button>
        </div>

        <!-- Upload Section -->
        <section class="upload-section" id="upload-tab" style="display:none;">
            <div class="input-wrapper">
                <input type="file" id="file-input" accept=".txt,.pdf,.md">
                <button id="upload-btn" onclick="uploadFile()">
                    <span class="btn-text">Upload to RAG</span>
                    <span class="btn-loader upload-loader" style="display:none;"></span>
                </button>
            </div>
            <p id="upload-status" class="status-msg"></p>
        </section>

        <!-- Input Section -->
        <section class="input-section" id="research-tab">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="question-input"
                    placeholder="e.g. What are the tax implications of converting a 401k to a Roth IRA?"
                    autocomplete="off"
                >
                <button id="submit-btn" onclick="submitQuestion()">
                    <span class="btn-text">Research</span>
                    <span class="btn-loader" style="display:none;"></span>
                </button>
            </div>
        </section>

        <!-- Team Display -->
        <section class="team-section" id="team-section" style="display:none;">
            <h2>Selected Team</h2>
            <div class="team-badges" id="team-badges"></div>
        </section>

        <!-- Error Display -->
        <section class="error-section" id="error-section" style="display:none;">
            <div class="error-card">
                <p id="error-message"></p>
            </div>
        </section>

        <!-- Final Answer -->
        <section class="answer-section" id="answer-section" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="margin-bottom: 0;">Final Answer</h2>
                <button id="view-chunks-btn" onclick="openChunksModal()" style="display:none; background:var(--accent-soft); color:#a5b4fc; border:1px solid var(--accent); padding:0.4rem 0.8rem; border-radius:var(--radius-sm); cursor:pointer; font-size:0.8rem; font-weight:600;">View Retrieved Chunks</button>
            </div>
            <div class="answer-card" id="final-answer"></div>
            <div class="rag-metrics" id="rag-metrics" style="display:none;"></div>
            <div class="run-summary" id="run-summary"></div>
            <a href="https://www.helicone.ai/requests" target="_blank" rel="noopener noreferrer" class="helicone-link">
                <span class="helicone-icon">⬡</span> View in Helicone
            </a>
        </section>
    </div>

    <!-- Context Modal -->
    <div id="chunks-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeChunksModal()">&times;</span>
            <h2>Retrieved Chunks</h2>
            <div id="chunks-container"></div>
        </div>
    </div>

    <script src="/static/index.js"></script>
</body>
</html>
